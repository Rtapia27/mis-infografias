<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rubén Tapia - Abogado | Tarjeta Digital</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Cinzel:wght@600;800&family=Playfair+Display:wght@400;700&display=swap');

        :root {
            --bg-dark: #0f141e;
            --card-bg: #161c28;
            --accent-blue: #4a90e2;
            --logo-sage: #b2bbab;
            --text-muted: #8e99a8;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-dark);
            color: white;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .main-container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 400px;
            border-radius: 50px;
            padding: 50px 30px 40px;
            box-shadow: 0 30px 60px rgba(0, 0, 0, 0.5);
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* BRANDING SECTION - FINAL REFINEMENT */
        .branding-header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 35px;
        }

        .logo-circle {
            width: 180px;
            height: 180px;
            border-radius: 50%;
            border: 4px solid white;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: black;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.3);
            margin-bottom: 20px;
        }

        .logo-circle img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .user-name {
            font-size: 26px;
            font-weight: 700;
            margin-top: 15px;
            margin-bottom: 2px;
            color: white;
        }

        .user-occupation {
            font-size: 14px;
            font-weight: 400;
            color: var(--text-muted);
            letter-spacing: 2px;
        }

        /* REST OF STYLE */
        .action-grid {
            display: flex;
            gap: 30px;
            margin-bottom: 45px;
        }

        .action-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
            text-decoration: none;
        }

        .circle-btn {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 1px solid rgba(255, 255, 255, 0.15);
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s ease;
        }

        .circle-btn:hover {
            border-color: var(--accent-blue);
            background-color: rgba(74, 144, 226, 0.1);
        }

        .action-label {
            font-size: 11px;
            font-weight: 500;
            color: var(--text-muted);
        }

        .links-container {
            width: 100%;
            display: flex;
            flex-direction: column;
            gap: 16px;
            margin-bottom: 40px;
        }

        .link-row {
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 24px;
            padding: 18px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            text-decoration: none;
            color: white;
            transition: all 0.2s ease;
        }

        .link-row:hover {
            background-color: rgba(255, 255, 255, 0.06);
        }

        .link-content {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .icon-box {
            width: 40px;
            height: 40px;
            border-radius: 12px;
            background-color: rgba(255, 255, 255, 0.05);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .link-text {
            font-size: 15px;
            font-weight: 500;
        }

        .chevron {
            color: rgba(255, 255, 255, 0.2);
            font-size: 14px;
        }

        .footer-divider {
            width: 100%;
            height: 1px;
            background-color: rgba(255, 255, 255, 0.05);
            margin-bottom: 25px;
        }

        .social-footer {
            display: flex;
            gap: 30px;
        }

        .social-icon {
            color: var(--text-muted);
            text-decoration: none;
            transition: color 0.3s ease;
        }

        .social-icon:hover {
            color: white;
        }

        #toast {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%) translateY(-100px);
            background: #1e293b;
            border: 1px solid var(--accent-blue);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            z-index: 100;
            transition: transform 0.3s ease;
            font-size: 13px;
        }

        #toast.show {
            transform: translateX(-50%) translateY(0);
        }

        ::-webkit-scrollbar {
            display: none;
        }
    </style>
</head>

    <script>
        function showToast(msg) {
            const t = document.getElementById('toast');
            t.innerText = msg;
            t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }
    </script>
